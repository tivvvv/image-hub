server:
  port: 8111
  servlet:
    context-path: /api

spring:
  profiles:
    active: prod
  servlet:
    multipart:
      max-file-size: 10MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/image_hub?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true&allowMultiQueries=true&serverTimezone=Asia/Shanghai
    username: root
    password: root
  redis:
    database: 0
    host: localhost
    port: 6379
    timeout: 5000
  shardingsphere:
    datasource:
      names: image_hub
      image_hub:
        type: com.zaxxer.hikari.HikariDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        url: jdbc:mysql://localhost:3306/image_hub?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true&allowMultiQueries=true&serverTimezone=Asia/Shanghai
        username: root
        password: root
    rules:
      sharding:
        tables:
          image:
            actual-data-nodes: image_hub.image
            table-strategy:
              standard:
                sharding-column: space_id
                sharding-algorithm-name: image_sharding_algorithm
        sharding-algorithms:
          image_sharding_algorithm:
            type: CLASS_BASED
            props:
              strategy: standard
              algorithmClassName: com.tiv.image.hub.manager.sharding.ImageShardingAlgorithm
    props:
      sql-show: true

sa-token:
  token-name: satoken
  timeout: 2592000
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-read-cookie: true
  cookie:
    path: /

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    enable-sql-runner: true
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

knife4j:
  enable: true
  openapi:
    title: image-hub 接口文档
    version: 1.0
    group:
      default:
        api-rule: package
        api-rule-resources:
          - com.tiv.image.hub.controller
